{% extends 'base.html' %}

{% block content %}
<div class="row justify-content-center mt-4">
    <div class="col-md-8">
        <div class="card border-0 shadow-sm">
            <div class="card-header bg-transparent border-0 pt-4 pb-0">
                <h5 class="mb-0 fw-bold text-warning"><i class="bi bi-person-fill-add me-2"></i>Cadastrar Novo Agente (Usuário)</h5>
            </div>
            <div class="card-body">
                <form method="post">
                    {% csrf_token %}
                    {% for field in form %}
                        <div class="mb-3">
                            <label for="{{ field.id_for_label }}" class="form-label fw-bold">{{ field.label }}</label>
                            {{ field }}
                            {% if field.help_text %}
                                <div class="form-text">{{ field.help_text|safe }}</div>
                            {% endif %}
                            {% for error in field.errors %}
                                <div class="text-danger small">{{ error }}</div>
                            {% endfor %}
                        </div>
                    {% endfor %}
                    <hr class="mt-4">
                    <div class="d-flex justify-content-between mt-3">
                        <a href="{% url 'listar_usuarios' %}" class="btn btn-light border fw-bold">Cancelar</a>
                        <button type="submit" class="btn btn-warning fw-bold text-dark"><i class="bi bi-person-plus-fill me-1"></i>Criar Agente</button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
